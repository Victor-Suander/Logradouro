# Nome da aplicação (apenas identificação interna)
spring.application.name=sistema-logradouro

# URL do banco H2 em memória (não salva dados após desligar)
spring.datasource.url=jdbc:h2:mem:logradourodb

# Driver do H2 (faz a conexão com o banco)
spring.datasource.driverClassName=org.h2.Driver

# Usuário padrão do H2
spring.datasource.username=sa

# Senha (vazia por padrão no H2)
spring.datasource.password=

# Faz o Hibernate criar/atualizar automaticamente as tabelas
spring.jpa.hibernate.ddl-auto=update

# Mostra os comandos SQL no console (muito útil para aprendizado)
spring.jpa.show-sql=true

# Formata o SQL para ficar legível no console
spring.jpa.properties.hibernate.format_sql=true

# Ativa o painel web do H2
spring.h2.console.enabled=true

# Define o caminho para acessar o H2 no navegador
# Depois você vai acessar: http://localhost:8080/h2-console
spring.h2.console.path=/h2-console

# Faz o Spring mostrar mensagens de erro detalhadas na resposta
server.error.include-message=always

# Mostra erros de validação (ex: campo obrigatório vazio)
server.error.include-binding-errors=always